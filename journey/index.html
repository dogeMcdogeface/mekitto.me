<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta property="og:type" content="website">
<meta property="og:title" content="Journey's Homepage - Under Construction">
<meta property="og:url" content="https://journey.mekitto.me/">
<meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Ontginning%2C_grondbewerking%2C_egaliseren%2C_bezanden%2C_arbeiders%2C_scraper-dozer%2C_%27men%2C_Bestanddeelnr_159-0625.jpg/960px-Ontginning%2C_grondbewerking%2C_egaliseren%2C_bezanden%2C_arbeiders%2C_scraper-dozer%2C_%27men%2C_Bestanddeelnr_159-0625.jpg?utm_source=commons.wikimedia.org&utm_campaign=gallery&utm_content=thumbnail">
<meta property="og:description" content="Journey's homepage on Mekittom">

<title>Journey's Homepage - Under Construction</title>

<style>
    * {
        box-sizing: border-box;
    }

    html,
    body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
            radial-gradient(circle at top left, #2d2d2d 0%, #161616 50%),
            #111;
        font-family: "Trebuchet MS", sans-serif;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 5vw;
    }

    .wrap {
        width: 100%;
        max-width: 1400px;
        perspective: 1200px;
    }

    .text {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap:
            clamp(0.3rem, 1vw, 1rem)
            clamp(0.6rem, 1.5vw, 1.5rem);
    }

    .word {
        display: flex;
        white-space: nowrap;
    }

    .char {
        display: inline-block;

        font-size: clamp(2.2rem, 9vw, 9rem);
        font-weight: 900;
        text-transform: uppercase;
        color: #f4f4f4;

        text-shadow:
            1px 1px 0 #999,
            2px 2px 0 #888,
            3px 3px 0 #777,
            4px 4px 0 #666,
            5px 5px 14px rgba(0,0,0,0.45);

        transform-style: preserve-3d;
        user-select: none;

        opacity: 1;

        animation:
            assemble 2.2s cubic-bezier(.2,.8,.2,1) forwards,
            float 4s ease-in-out infinite alternate;
    }

    .sub {
        margin-top: 3rem;
        text-align: center;
        color: rgba(255,255,255,0.45);
        font-size: clamp(0.9rem, 2vw, 1.2rem);
        letter-spacing: 0.25em;
        text-transform: lowercase;
    }

    @keyframes assemble {
        from {
            transform:
                translate(var(--scatterX), var(--scatterY))
                rotate(var(--scatterRotate))
                scale(1);

            opacity: 1;
            filter: blur(0px);
        }

        to {
            transform:
                translate(0px, 0px)
                rotate(0deg)
                scale(1);

            opacity: 1;
            filter: blur(0px);
        }
    }

    @keyframes float {
        from {
            translate: 0 0px;
        }
        to {
            translate: 0 -5px;
        }
    }

    @media (max-width: 700px) {
        .sub {
            margin-top: 2rem;
            line-height: 1.5;
            letter-spacing: 0.15em;
        }
    }
</style>
</head>
<body>

<div class="wrap">
    <div class="text" id="text"></div>

    <div class="sub">
        please check back later
    </div>
</div>

<script>
    const message = "the website is under construction";
    const container = document.getElementById("text");

    const ASSEMBLE_DURATION = 3000;
    const DELAY_STEP = 100;
    const LOOP_PAUSE = 1000;

    function buildAnimation() {

        container.innerHTML = "";

        const words = message.split(" ");

        let totalChars = 0;

        words.forEach(word => totalChars += word.length);

        words.forEach((word, wordIndex) => {

            const wordEl = document.createElement("div");
            wordEl.className = "word";

            [...word].forEach((char, charIndex) => {

                const span = document.createElement("span");
                span.className = "char";
                span.textContent = char;

                const seed = (wordIndex * 10) + charIndex;

                // ORIGINAL scattered positions
                const rotate = (Math.sin(seed * 1.7) * 10).toFixed(2);
                const y = (Math.cos(seed * 1.3) * 5).toFixed(2);
                const x = (Math.sin(seed * 0.9) * 5).toFixed(2);

                span.style.setProperty("--scatterX", `${x}px`);
                span.style.setProperty("--scatterY", `${y}px`);
                span.style.setProperty("--scatterRotate", `${rotate}deg`);

                const delay = seed * DELAY_STEP;

                span.style.animationDelay = `
                    ${delay}ms,
                    ${delay + ASSEMBLE_DURATION}ms
                `;

                wordEl.appendChild(span);
            });

            container.appendChild(wordEl);
        });

        const totalDuration =
            (totalChars * DELAY_STEP) +
            ASSEMBLE_DURATION +
            LOOP_PAUSE;

        setTimeout(buildAnimation, totalDuration);
    }

    buildAnimation();
</script>

</body>
</html>
